services:
  # --- Lightweight Milvus standalone (etcd + minio + milvus) ---
  # Official minimal stack; Attu/OS/Postgres intentionally omitted.
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: rag-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "2147483648"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ./volumes/etcd:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    mem_limit: 256m
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: rag-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /data --console-address ":9001"
    volumes:
      - ./volumes/minio:/data
    # No host ports — only Milvus needs MinIO internally
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: rag-milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      # Cap memory pressure for local/dev
      COMMON_STORAGETYPE: local
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 5
    mem_limit: 2g
    restart: unless-stopped

  # --- Light CPU embeddings (multilingual e5-small, 384-d) ---
  # Much smaller than Infinity+bge-m3. OpenAI-compatible /v1/embeddings.
  embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    container_name: rag-milvus-embedder
    command:
      - --model-id
      - intfloat/multilingual-e5-small
      - --port
      - "80"
    volumes:
      - ./volumes/tei-models:/data
    ports:
      - "8080:80"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    mem_limit: 1g
    restart: unless-stopped

  api:
    build: .
    container_name: rag-milvus-api
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      MILVUS_URI: http://milvus:19530
      EMBEDDER_URL: http://embedder:80
      EMBEDDING_MODEL: intfloat/multilingual-e5-small
      EMBEDDING_DIMENSION: "384"
      RERANKER_URL: ""
      CONTEXTUAL_RETRIEVAL_ENABLED: "false"
      CONTEXTUAL_RETRIEVAL_MOCK: "true"
      REQUIRE_ORG_CONTEXT: "false"
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
      ADMIN_AUTH_REQUIRED: "true"
      CORS_ORIGINS: "*"
    depends_on:
      milvus:
        condition: service_healthy
      embedder:
        condition: service_started
    mem_limit: 512m
    restart: unless-stopped

# Optional heavier profile: Infinity + BGE-M3 (1024-d) — use:
#   docker compose --profile heavy up -d
# and set EMBEDDING_DIMENSION=1024 + recreate Milvus collection.
  embedder-bge-m3:
    profiles: ["heavy"]
    image: michaelf34/infinity:latest
    command: v2 --model-id BAAI/bge-m3 --port 7997
    ports:
      - "7997:7997"
    mem_limit: 4g
